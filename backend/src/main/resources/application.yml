spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: timetable-productivity-manager

  datasource:
    url: jdbc:postgresql://localhost:5433/timetable_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
    time-zone: Asia/Kolkata

server:
  port: 8083
  servlet:
    context-path: /

# JWT Configuration (free - JJWT library)
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION:86400000}         # 24 hours
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days




# Springdoc / Swagger UI (free)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    try-it-out-enabled: true
  show-actuator: false

management:
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

# Logging (SLF4J - free)
logging:
  level:
    root: INFO
    com.timetable: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log

# Scheduling
app:
  notification:
    cleanup-days: 30    # delete read notifications older than 30 days
  pomodoro:
    work-duration-minutes: 25
    short-break-minutes: 5
    long-break-minutes: 15
    sessions-before-long-break: 4
  upload:
    dir: ${UPLOAD_DIR:uploads}   # Relative to backend working dir; override via env
